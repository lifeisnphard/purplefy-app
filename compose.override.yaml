services:
  wp:
    env_file: .env.dev
    restart: 'no'
    ports:
      - '8081:8081'
    entrypoint: []
    command: /var/www/html/wp-content/vendor/bin/wp server --host=0.0.0.0 --port=8081

  nginx:
    image: cgr.dev/chainguard/nginx:latest-dev@sha256:549ad2b1c385cf843bbca3bfc0e6a5533a0cdf0b8d70faf2f3d43c171f4dc9c2
    restart: 'no'

  mariadb:
    image: cgr.dev/chainguard/mariadb:latest-dev@sha256:1a35eb9fed9a5dc7cd7dcf43ff1237fc6051115b2c72c181fa1e02536590e903
    env_file: .env.dev
    restart: 'no'
